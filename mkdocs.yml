site_name: stratosampler
site_description: Stratified molecular dataset splitting for QSAR model development
site_url: https://github.com/rubbs14/stratosampler
repo_url: https://github.com/rubbs14/stratosampler
repo_name: stratosampler

theme:
  name: material
  palette:
    scheme: slate
    primary: green
    accent: light-green
  features:
    - navigation.instant
    - navigation.tracking
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google

nav:
  - Home: index.md
  - API Reference:
      - Property Stratified Splitter: api/splitters/property_stratified.md
      - Metrics: api/metrics/distribution.md
      - Visualization: api/visualisation/plots.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.emoji
  - admonition
  - tables
  - toc:
      permalink: true
