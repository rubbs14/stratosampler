[project]
name = "stratosampler"
description = "Stratified molecular dataset splitting for QSAR model development"
version = "0.1.0"
homepage = "https://github.com/rubbs14/stratosampler"
repository = "https://github.com/rubbs14/stratosampler"

[build]
output_dir = "site"
search = true

[[modules]]
path = "stratosampler"
include_private = false

[[pages]]
title = "Home"
path = "README.md"

[[pages]]
title = "Getting Started"
path = "docs/getting_started.md"

[[pages]]
title = "Examples"
path = "docs/examples.md"

[[pages]]
title = "API Reference"
path = "docs/api.md"

[theme]
dark = true
accent_color = "#2E7D32"
